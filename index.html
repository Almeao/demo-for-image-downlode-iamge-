<!DOCTYPE html>
<html>
<head>
  <title>Filter Gallery</title>

  <style>

    body{
      font-family: Arial;
      padding:20px;
    }

    .buttons{
      margin-bottom:20px;
    }

    .buttons button{
      padding:10px 20px;
      margin:5px;
      border:none;
      background:black;
      color:white;
      cursor:pointer;
      border-radius:5px;
    }

    .gallery{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
    }

    .image-box{
      width:250px;
    }

    .image-box img{
      width:100%;
      border-radius:10px;
    }

    .download-btn{
      display:inline-block;
      margin-top:10px;
      padding:8px 15px;
      background:#333;
      color:white;
      text-decoration:none;
      border-radius:5px;
    }

  </style>
</head>

<body>

  <div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('wedding')">Wedding</button>
    <button onclick="filterImages('birthday')">Birthday</button>
    <button onclick="filterImages('concert')">Concert</button>
  </div>

  <div class="gallery">

    <!-- Wedding -->
    <div class="image-box wedding">
      <img src="wedding1.jpg">
      <a href="wedding1.jpg" download class="download-btn">
        Download
      </a>
    </div>

    <!-- Birthday -->
    <div class="image-box birthday">
      <img src="birthday1.jpg">
      <a href="birthday1.jpg" download class="download-btn">
        Download
      </a>
    </div>

    <!-- Concert -->
    <div class="image-box concert">
      <img src="concert1.jpg">
      <a href="concert1.jpg" download class="download-btn">
        Download
      </a>
    </div>

    <!-- Another Wedding -->
    <div class="image-box wedding">
      <img src="wedding2.jpg">
      <a href="wedding2.jpg" download class="download-btn">
        Download
      </a>
    </div>

  </div>

  <script>

    function filterImages(category){

      let images = document.querySelectorAll('.image-box');

      images.forEach(function(image){

        if(category === 'all'){
          image.style.display = 'block';
        }
        else if(image.classList.contains(category)){
          image.style.display = 'block';
        }
        else{
          image.style.display = 'none';
        }

      });

    }

  </script>

</body>
</html>
